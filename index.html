<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>.:CRIMEN:.</title>

<link rel="stylesheet" href="style.css">
<script src="js/ansilove.js"></script>
</head>
<body>

<div class="bbs">

  <div class="ansi-wrapper">
  </div>

  <div id="indice">
  </div>

</div>

<script>
AnsiLove.render("ansi/crimen_index.ans", function(canvas){

  canvas.style.maxWidth = "100%";
  canvas.style.height = "auto";

  const wrapper = document.querySelector(".ansi-wrapper");
  wrapper.insertBefore(canvas, wrapper.firstChild);

},{
  bits:"9",
  icecolors:1
});

const grimorios = [
  {
    indice: "ansi/grimorio1/indice_grimorio1_folio3.ans",
    pagina: "ansi/grimorio1/index.html"
  }
];

grimorios.forEach(grimorio => {

  const enlace = document.createElement("a");

  enlace.href = grimorio.pagina;
  enlace.style.display = "block";

  AnsiLove.render(
    grimorio.indice,
    function(canvas){

      canvas.style.maxWidth = "100%";
      canvas.style.height = "auto";

      enlace.appendChild(canvas);

      document
        .getElementById("indice")
        .appendChild(enlace);

    },{
      bits:"9",
      icecolors:1
    }
  );

});
</script>

</body>
</html>
